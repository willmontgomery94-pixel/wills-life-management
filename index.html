<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>W&R Life Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f4f1eb;
      --bg2:         #ede9e1;
      --surface:     #ffffff;
      --surface2:    #f9f7f3;
      --border:      #ddd8cc;
      --border-soft: #e8e4da;
      --forest:      #2d4a3e;
      --sage:        #5a7a6a;
      --moss:        #7a9e7e;
      --lime:        #a8c5a0;
      --mint:        #d4e8d0;
      --fern:        #3d6b52;
      --text:        #1a2820;
      --text-muted:  #4a6a5a;
      --text-dim:    #8fa89a;
      --red:         #c0513a;
      --amber:       #b8862a;
      --green-ok:    #3d6b52;
      /* expense row tones - warm ivory -> dusty rose -> terracotta */
      --exp-1: #fdf8f5;
      --exp-2: #faf3ef;
      --exp-3: #f7ede7;
      --exp-4: #f4e7df;
      --exp-5: #f0dfd5;
      --exp-6: #ecdad0;
      --exp-7: #e8d4c8;
      --exp-8: #e3ccbf;
      --exp-9: #dfc5b6;
      --radius:    10px;
      --radius-lg: 14px;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      font-weight: 300;
    }

    /* ── NAV ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 36px; height: 62px;
      background: var(--forest);
      box-shadow: 0 2px 20px rgba(45,74,62,0.22);
    }
    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 21px; font-weight: 600;
      color: var(--mint); letter-spacing: 0.05em;
      display: flex; align-items: baseline; gap: 0;
    }
    .nav-brand-amp { color: var(--lime); font-weight: 300; margin: 0 1px; }
    .nav-brand-sub {
      font-family: 'Jost', sans-serif;
      color: rgba(212,232,208,0.5); font-weight: 300;
      font-size: 12px; margin-left: 12px; letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .nav-tabs {
      display: flex; gap: 2px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; /* Firefox */
    }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tab {
      padding: 8px 16px; border-radius: 6px; border: none;
      background: transparent; color: rgba(212,232,208,0.5);
      font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 400;
      cursor: pointer; transition: all 0.18s; letter-spacing: 0.04em;
      white-space: nowrap; flex-shrink: 0;
    }
    .nav-tab:hover  { color: var(--mint); background: rgba(255,255,255,0.07); }
    .nav-tab.active { background: rgba(168,197,160,0.18); color: var(--lime); }

    /* ── PAGE ── */
    .page { padding: 82px 36px 56px; max-width: 1180px; margin: 0 auto; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page > * { animation: fadeUp 0.3s ease both; }
    .page > *:nth-child(1) { animation-delay: 0.03s; }
    .page > *:nth-child(2) { animation-delay: 0.08s; }
    .page > *:nth-child(3) { animation-delay: 0.13s; }
    .page > *:nth-child(4) { animation-delay: 0.18s; }
    .page > *:nth-child(5) { animation-delay: 0.23s; }

    /* ── HOME ── */
    .home-hero {
      padding: 48px 0 30px;
      border-bottom: 1px solid var(--border-soft);
      margin-bottom: 30px;
    }
    .home-eyebrow {
      font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--moss); margin-bottom: 12px;
    }
    .home-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 6vw, 70px);
      font-weight: 300; line-height: 1.05; color: var(--forest);
    }
    .home-title strong { font-weight: 600; color: var(--fern); }
    .home-date { color: var(--text-dim); font-size: 13px; margin-top: 10px; letter-spacing: 0.06em; }
    .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .home-panel {
      background: var(--surface); border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg); padding: 22px 26px;
    }
    .home-panel-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em;
      color: var(--text-dim); margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .home-panel-title::before {
      content: ''; display: block; width: 3px; height: 13px;
      background: var(--moss); border-radius: 2px;
    }
    .due-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; border-bottom: 1px solid var(--border-soft);
    }
    .due-item:last-child { border-bottom: none; }
    .due-item-name { font-size: 14px; color: var(--text); }
    .due-item-sub  { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .home-empty { color: var(--text-dim); font-size: 13px; padding: 6px 0; }

    /* ── SECTION HEADER ── */
    .section-header { margin-bottom: 22px; padding-top: 6px; }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 400; color: var(--forest);
    }
    .section-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; letter-spacing: 0.05em; }

    /* ── GRIDS ── */
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 26px; }

    /* ── STAT CARDS ── */
    .stat-card {
      background: var(--surface); border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg); padding: 18px 20px;
      position: relative; overflow: hidden;
    }
    .stat-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--moss), var(--lime));
    }
    .stat-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--text-dim); margin-bottom: 6px;
    }
    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 500; color: var(--forest); line-height: 1;
    }
    .stat-note   { font-size: 12px; color: var(--text-dim); margin-top: 5px; }
    .stat-change { font-size: 12px; margin-top: 4px; }
    .stat-change.pos { color: var(--green-ok); }
    .stat-change.neg { color: var(--red); }

    /* ── BADGES ── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 500; letter-spacing: 0.04em; white-space: nowrap;
    }
    .badge-overdue  { background: rgba(192,81,58,0.10);  color: var(--red);      border: 1px solid rgba(192,81,58,0.25); }
    .badge-due-soon { background: rgba(184,134,42,0.10); color: var(--amber);    border: 1px solid rgba(184,134,42,0.25); }
    .badge-ok       { background: rgba(61,107,82,0.10);  color: var(--green-ok); border: 1px solid rgba(61,107,82,0.22); }

    /* ══════════════════════════════════════════════
       BUDGET
    ══════════════════════════════════════════════ */
    /* Top summary bar */
    .budget-summary {
      background: var(--forest); border-radius: var(--radius-lg);
      padding: 20px 28px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 0;
    }
    .bs-item {
      flex: 1; text-align: center; position: relative;
    }
    .bs-item + .bs-item::before {
      content: ''; position: absolute; left: 0; top: 15%; bottom: 15%;
      width: 1px; background: rgba(212,232,208,0.2);
    }
    .bs-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
      color: rgba(212,232,208,0.55); margin-bottom: 5px;
    }
    .bs-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 500; color: var(--lime);
    }
    .bs-item.total .bs-label { color: rgba(212,232,208,0.8); }
    .bs-item.total .bs-value { color: #fff; font-size: 30px; }

    .budget-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 18px; }
    .budget-block {
      background: var(--surface); border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .budget-block-head {
      background: var(--forest); padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .budget-block-head-title { font-size: 13px; color: var(--mint); letter-spacing: 0.04em; font-weight: 400; }
    .budget-block-head-total {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; color: var(--lime); font-weight: 400;
    }
    .budget-block-head-edit {
      background: rgba(255,255,255,0.1); border: none; color: var(--lime);
      font-size: 11px; font-family: 'Jost', sans-serif; letter-spacing: 0.06em;
      padding: 4px 10px; border-radius: 5px; cursor: pointer; transition: background 0.15s;
    }
    .budget-block-head-edit:hover { background: rgba(255,255,255,0.18); }

    /* expense rows with colour gradient */
    /* Budget rows — 4 col grid: name | monthly | annual | actions */
    .budget-row-header {
      display: grid; grid-template-columns: 1fr 90px 90px 80px;
      padding: 7px 20px; background: var(--bg2);
      border-bottom: 1px solid var(--border-soft);
    }
    .budget-row-header span {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim);
    }
    .budget-row {
      display: grid; grid-template-columns: 1fr 90px 90px 80px;
      align-items: center;
      padding: 10px 20px; border-bottom: 1px solid rgba(220,210,200,0.5);
      transition: filter 0.12s;
    }
    .budget-row:hover { filter: brightness(0.97); }
    .budget-row:last-child { border-bottom: none; }
    .budget-row-name { font-size: 13px; font-weight: 400; }
    .budget-row-amt  { font-size: 13px; font-weight: 500; }
    .budget-row-actions { display: flex; gap: 5px; opacity: 0; transition: opacity 0.15s; }
    .budget-row:hover .budget-row-actions { opacity: 1; }
    .budget-row-btn {
      background: none; border: none; cursor: pointer;
      font-size: 12px; padding: 2px 7px; border-radius: 4px;
      font-family: 'Jost', sans-serif;
    }
    .budget-row-btn.edit { color: var(--sage); }
    .budget-row-btn.edit:hover { background: var(--mint); color: var(--fern); }
    .budget-row-btn.del { color: #c0513a88; }
    .budget-row-btn.del:hover { background: rgba(192,81,58,0.08); color: var(--red); }

    .budget-row.add-row { cursor: pointer; background: #f9f6f3; }
    .budget-row.add-row:hover { background: var(--mint); filter: none; }
    .budget-row.total { background: var(--mint); }
    .budget-row.total .budget-row-name,
    .budget-row.total .budget-row-amt  { color: var(--fern); font-weight: 600; }
    .budget-row.total:hover { filter: none; }
    .budget-row.remaining .budget-row-name,
    .budget-row.remaining .budget-row-amt { color: var(--text-dim); font-weight: 400; }
    .budget-row.remaining { background: var(--surface2); }
    .budget-row.remaining:hover { filter: none; }

    /* Pot toggle in modal */
    .pot-toggle-row { padding: 4px 0; }
    .pot-toggle-label {
      display: flex; align-items: center;
      font-size: 13px; color: var(--text-muted); cursor: pointer; user-select: none;
    }

    /* deposit edit row inside head */
    .deposit-edit-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 20px 10px; background: rgba(45,74,62,0.04);
      border-bottom: 1px solid var(--border-soft);
    }
    .deposit-edit-row label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
    .deposit-edit-row input {
      width: 110px; padding: 5px 10px;
      border: 1px solid var(--border); border-radius: 6px;
      font-family: 'Jost', sans-serif; font-size: 13px; color: var(--text);
      background: var(--surface); outline: none;
    }
    .deposit-edit-row input:focus { border-color: var(--moss); }
    .deposit-save-btn {
      padding: 5px 14px; background: var(--fern); color: #fff;
      border: none; border-radius: 6px; font-family: 'Jost', sans-serif;
      font-size: 12px; cursor: pointer;
    }
    .deposit-save-btn:hover { background: var(--forest); }

    /* budget inline edit */
    .row-edit-input {
      width: 90px; padding: 4px 8px; border: 1px solid var(--moss);
      border-radius: 5px; font-family: 'Jost', sans-serif; font-size: 13px;
      background: #fff; outline: none;
    }
    .row-edit-name {
      flex: 1; padding: 4px 8px; border: 1px solid var(--moss);
      border-radius: 5px; font-family: 'Jost', sans-serif; font-size: 13px;
      background: #fff; outline: none; margin-right: 8px;
    }

    /* ══════════════════════════════════════════════
       ACCOUNTS
    ══════════════════════════════════════════════ */
    .acc-cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 24px; }
    .acc-card {
      background: var(--surface); border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg); padding: 16px 20px;
      position: relative; overflow: hidden;
    }
    .acc-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--moss), var(--lime));
    }
    .acc-card-name {
      font-size: 13px; font-weight: 500; color: var(--forest);
      letter-spacing: 0.02em; margin-bottom: 4px;
    }
    .acc-card-val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 500; color: var(--text); line-height: 1.1;
    }
    .acc-card-chg { font-size: 12px; margin-top: 4px; }
    .acc-card-chg.pos { color: var(--green-ok); }
    .acc-card-chg.neg { color: var(--red); }
    .acc-card-periods { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .period-badge {
      font-size: 11px; font-weight: 500; padding: 2px 8px;
      border-radius: 12px; letter-spacing: 0.03em;
    }
    .period-badge.pos { background: rgba(61,107,82,0.10); color: var(--green-ok); border: 1px solid rgba(61,107,82,0.2); }
    .period-badge.neg { background: rgba(192,81,58,0.10); color: var(--red); border: 1px solid rgba(192,81,58,0.2); }
    .acc-add-btn {
      margin-top: 10px; background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 12px; font-family: 'Jost', sans-serif;
      font-size: 12px; color: var(--sage); cursor: pointer; transition: all 0.15s;
      display: inline-block;
    }
    .acc-add-btn:hover { border-color: var(--moss); color: var(--fern); background: var(--mint); }

    .acc-total-bar {
      background: var(--forest); border-radius: var(--radius-lg);
      padding: 14px 24px; margin-bottom: 24px;
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .acc-total-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(212,232,208,0.6); }
    .acc-total-val { font-family: 'Cormorant Garamond', serif; font-size: 28px; color: #fff; font-weight: 400; }

    .acc-tables { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .acc-table {
      background: var(--surface); border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .acc-table-title {
      padding: 12px 18px; border-bottom: 1px solid var(--border-soft);
      background: var(--surface2);
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .acc-table-name {
      font-size: 14px; font-weight: 500; color: var(--forest); letter-spacing: 0.02em;
    }
    .acc-table-latest {
      font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--fern);
    }
    .acc-thead, .acc-row {
      display: grid; grid-template-columns: 130px 1fr 1fr 1fr;
      padding: 9px 18px;
    }
    .acc-thead {
      border-bottom: 1px solid var(--border-soft); background: var(--bg2);
    }
    .acc-thead span { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim); }
    .acc-row { border-bottom: 1px solid var(--border-soft); transition: background 0.12s; }
    .acc-row:last-child { border-bottom: none; }
    .acc-row:hover { background: var(--surface2); }
    .acc-row span { font-size: 13px; color: var(--text); display: flex; align-items: center; }
    .acc-row .date { color: var(--text-muted); font-size: 12px; }
    .acc-row .pos  { color: var(--green-ok); }
    .acc-row .neg  { color: var(--red); }
    .acc-row .dim  { color: var(--text-dim); }

    /* ══════════════════════════════════════════════
       TRACKER
    ══════════════════════════════════════════════ */
    .tracker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .tracker-item {
      background: var(--surface); border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg); padding: 18px 22px;
      display: flex; flex-direction: column; gap: 10px;
      transition: box-shadow 0.2s; border-left: 3px solid transparent;
    }
    .tracker-item:hover { box-shadow: 0 4px 18px rgba(45,74,62,0.08); }
    .tracker-item.is-due  { border-left-color: var(--red); }
    .tracker-item.is-soon { border-left-color: var(--amber); }
    .tracker-item-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .tracker-item-name { font-size: 15px; font-weight: 500; color: var(--forest); }
    .tracker-item-provider { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .tracker-item-cost { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--sage); }
    .tracker-dates { display: flex; gap: 22px; }
    .tracker-date-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); }
    .tracker-date-val { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .tracker-notes { font-size: 11px; color: var(--text-dim); font-style: italic; }

    /* ══════════════════════════════════════════════
       HOME KEEPING
    ══════════════════════════════════════════════ */
    .hk-toolbar {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 22px;
    }
    .hk-add-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--forest); color: var(--mint);
      border: none; border-radius: 8px; padding: 10px 20px;
      font-family: 'Jost', sans-serif; font-size: 13px; cursor: pointer;
      transition: background 0.18s; letter-spacing: 0.04em;
    }
    .hk-add-btn:hover { background: var(--fern); }

    .hk-tasks { display: flex; flex-direction: column; gap: 9px; }
    .hk-task {
      background: var(--surface); border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg); padding: 14px 20px;
      display: flex; align-items: center; gap: 14px;
      transition: box-shadow 0.18s; border-left: 3px solid transparent;
    }
    .hk-task:hover { box-shadow: 0 3px 14px rgba(45,74,62,0.07); }
    .hk-task.overdue  { border-left-color: var(--red); }
    .hk-task.due-soon { border-left-color: var(--amber); }
    .hk-task.ok       { border-left-color: var(--lime); }

    .hk-check {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--border); background: transparent;
      cursor: pointer; flex-shrink: 0; transition: all 0.18s;
    }
    .hk-check:hover { border-color: var(--moss); background: var(--mint); }

    .hk-task-body { flex: 1; min-width: 0; }
    .hk-task-name { font-size: 14px; color: var(--text); font-weight: 400; }
    .hk-task-meta { font-size: 11px; color: var(--text-dim); margin-top: 3px; display: flex; gap: 14px; flex-wrap: wrap; }
    .hk-task-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .hk-icon-btn {
      background: none; border: 1px solid var(--border); cursor: pointer;
      color: var(--text-dim); font-size: 12px; padding: 3px 9px;
      border-radius: 5px; font-family: 'Jost', sans-serif;
      transition: all 0.15s; letter-spacing: 0.04em;
    }
    .hk-icon-btn:hover { border-color: var(--sage); color: var(--sage); background: var(--surface2); }
    .hk-icon-btn.danger:hover { border-color: var(--red); color: var(--red); }

    /* ══════════════════════════════════════════════
       SHARED MODAL
    ══════════════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(30,46,39,0.42); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border-soft);

const TODAY = new Date(); TODAY.setHours(0,0,0,0);

function fmt(n) {
  if (n == null) return '—';
  return '£' + n.toLocaleString('en-GB', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function fmtDate(str) {
  if (!str || str === 'null' || str === '') return '—';
  // Always parse from ISO YYYY-MM-DD to avoid timezone shifts
  const parts = String(str).substring(0,10).split('-');
  if (parts.length !== 3) return str;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return parseInt(parts[2]) + ' ' + months[parseInt(parts[1])-1] + ' ' + parts[0];
}

// Canonical sort: newest first by ISO string
function sortEntriesDesc(entries) {
  return [...entries].sort((a,b) => b.iso.localeCompare(a.iso));
}
function daysBetween(str) {
  if (!str) return null;
  const d = new Date(str); d.setHours(0,0,0,0);
  return Math.round((d - TODAY) / 86400000);

function pctChange(curr, prev) {

function sumAmt(arr) { return arr.reduce((s,x) => s + Number(x.amount), 0); }

function cleanDate(val) {
  if (!val || val === 'null' || val === '') return null;

  if (/^\d{4}-\d{2}-\d{2}$/.test(String(val))) return String(val);

    const d = new Date(val);

    return d.toISOString().split('T')[0];
  } catch(e) { return null; }

function taskEffectiveDue(t) {

  const due = taskEffectiveDue(t);
  if (!due && !t.lastDone) return -9999;
  if (!due) return -9999;
  return daysBetween(due);
}
function taskStatus(t) {
  const d = taskDays(t);
  if (d < 0)  return 'overdue';
  if (d <= 3) return 'due-soon';
  return 'ok';
}
function taskLabel(t) {
  const d = taskDays(t);
  if (d === -9999) return 'Never done';
  if (d < 0)  return `Overdue ${Math.abs(d)}d`;
  if (d === 0) return 'Due today';
  return `Due in ${d}d`;
}
function rnStatus(days) {
  if (days == null) return null;
  if (days < 0)   return 'overdue';
  if (days <= 60) return 'due-soon';
  return 'ok';
}
function rnLabel(days) {
  if (days == null) return null;
  if (days < 0)  return `Overdue ${Math.abs(days)}d`;
  if (days === 0) return 'Due today';
  return `Due in ${days}d`;
}

// Convert any frequency to a monthly amount
function freqToMonthly(amount, freqNum, freqUnit) {
  const n = parseFloat(amount) || 0;
  const num = parseInt(freqNum) || 1;
  if (freqUnit === 'days')   return (n * 365) / (num * 12); // annualise then monthly
  if (freqUnit === 'months') return n / num;
  if (freqUnit === 'years')  return n / (num * 12);
  return n; // default monthly
}

function BudgetBlock({ title, deposit, rows, setDeposit, setRows }) {
  const [editingDeposit, setEditingDeposit] = useState(false);
  const [depositInput,   setDepositInput]   = useState(String(deposit));
  const [rowModal,       setRowModal]        = useState(null);
  const total = sumAmt(rows);
  const displayDeposit = title === 'Bills Pot' ? deposit * 2
    : title === 'Joint Expenses' ? deposit * 2
    : deposit;

  // Sort largest -> smallest; colour by amount rank (largest = darkest)
  const sortedRows = [...rows].sort((a,b) => Number(b.amount) - Number(a.amount));
  const maxAmt = sortedRows.length > 0 ? Number(sortedRows[0].amount) : 1;

  function rowColor(amount) {
    const t = Math.pow(Math.min(Number(amount) / maxAmt, 1), 0.6);
    const r = Math.round(253 + t * (192 - 253));
    const g = Math.round(248 + t * ( 88 - 248));
    const b = Math.round(245 + t * ( 68 - 245));
    return `rgb(${r},${g},${b})`;
  }
  function textColor(amount) {
    const t = Math.pow(Math.min(Number(amount) / maxAmt, 1), 0.6);
    return t > 0.55 ? '#2e1008' : '#3a2010';
  }

  function saveDeposit() {
    const v = parseFloat(depositInput);
    if (!isNaN(v) && v > 0) setDeposit(v);
    setEditingDeposit(false);
  }
  function saveRow(data) {
    if (rowModal === 'add') {
      setRows(prev => [...prev, { id: Date.now(), ...data }]);
    } else {
      setRows(prev => prev.map(r => r.id === rowModal.id ? { ...r, ...data } : r));
    }
    setRowModal(null);
  }
  function delRow(id) { setRows(prev => prev.filter(r => r.id !== id)); }

  return h('div', { className:'budget-block' },
    h('div', { className:'budget-block-head' },
      h('span', { className:'budget-block-head-title' }, title),
      h('div', { style:{ display:'flex', alignItems:'center', gap:10 } },
        h('span', { className:'budget-block-head-total' }, fmt(displayDeposit)),
        h('button', { className:'budget-block-head-edit', onClick:()=>setEditingDeposit(v=>!v) }, 'Edit')
      )
    ),

    editingDeposit && h('div', { className:'deposit-edit-row' },
      h('label', null, 'Your deposit (£):'),
      h('input', { type:'number', value:depositInput,
        onChange:e=>setDepositInput(e.target.value),
        onKeyDown:e=>e.key==='Enter'&&saveDeposit()
      }),
      h('button', { className:'deposit-save-btn', onClick:saveDeposit }, 'Save')
    ),

    h('div', { className:'budget-row-header' },
      h('span', null, 'Expense'), h('span', null, 'Monthly'), h('span', null, 'Annual'), h('span', null, '')
    ),

    sortedRows.map((r) =>
      h('div', { key:r.id, className:'budget-row',
        style:{ background: rowColor(r.amount) }
      },
        h('span', { className:'budget-row-name', style:{ color: textColor(r.amount) } },
          r.isPot ? h('span', { style:{display:'flex',alignItems:'center'} }, h(PotIcon), r.name) : r.name
        ),
        h('span', { className:'budget-row-amt', style:{ color: textColor(r.amount) } }, fmt(r.amount)),
        h('span', { className:'budget-row-amt', style:{ color: textColor(r.amount), opacity:0.7 } }, fmt(r.amount * 12)),
        h('span', { className:'budget-row-actions' },
          h('button', { className:'budget-row-btn edit', onClick:()=>setRowModal(r) }, 'Edit'),
          h('button', { className:'budget-row-btn del',  onClick:()=>delRow(r.id)  }, '×')
        )
      )
    ),

    h('div', { className:'budget-row add-row', onClick:()=>setRowModal('add') },
      h('span', { style:{ color:'var(--moss)', fontSize:13 } }, '+ Add item'),
      h('span', null, ''), h('span', null, ''), h('span', null, '')
    ),

    h('div', { className:'budget-row total' },
      h('span', { className:'budget-row-name' }, 'Total allocated'),
      h('span', { className:'budget-row-amt'  }, fmt(total)),
      h('span', { className:'budget-row-amt'  }, fmt(total * 12)),
      h('span', null, '')
    ),
    h('div', { className:'budget-row remaining' },
      h('span', { className:'budget-row-name' }, 'Remaining'),
      h('span', { className:'budget-row-amt'  }, fmt(displayDeposit - total)),
      h('span', { className:'budget-row-amt'  }, fmt((displayDeposit - total) * 12)),
      h('span', null, '')
    ),

    rowModal && h(BudgetRowModal, {
      row: rowModal === 'add' ? null : rowModal,
      onSave: saveRow,
      onClose: () => setRowModal(null)
    })
  );
}

// Find the entry closest to N months ago
function entryNMonthsAgo(entries, months) {
  const target = new Date(TODAY);
  target.setMonth(target.getMonth() - months);
  const targetMs = target.getTime();
  let best = null, bestDiff = Infinity;
  for (const e of entries) {
    const diff = Math.abs(new Date(e.iso).getTime() - targetMs);
    if (diff < bestDiff) { bestDiff = diff; best = e; }
  }
  return best;
}

function AccountsPage({ pay, setPay, accounts, setAccounts, links, setLinks }) {
  const [addingTo,   setAddingTo]  = useState(null);
  const [historyFor, setHistoryFor]= useState(null);
  const [editEntry,  setEditEntry] = useState(null);

  function addEntry(label, entry) {
    setAccounts(prev => prev.map(a => {
      if (a.label !== label) return a;
      const merged = [entry, ...a.entries].map(e => ({ ...e, date: fmtDate(e.iso) }));
      return { ...a, entries: sortEntriesDesc(merged) };
    }));
    setAddingTo(null);
  }

  function updateEntry(label, oldIso, newEntry) {
    setAccounts(prev => prev.map(a => {
      if (a.label !== label) return a;
      const entries = a.entries
        .map(e => e.iso === oldIso ? { ...newEntry, date: fmtDate(newEntry.iso) } : e);
      return { ...a, entries: sortEntriesDesc(entries) };
    }));
    setEditEntry(null);
  }

  function deleteEntry(label, iso) {
    setAccounts(prev => prev.map(a => {
      if (a.label !== label) return a;
      return { ...a, entries: a.entries.filter(e => e.iso !== iso) };
    }));
    setEditEntry(null);
  }

  const safeAccounts = accounts.map(a => ({ ...a, entries: sortEntriesDesc(a.entries) }));
  const total = safeAccounts.reduce((s,a) => s + (a.entries[0]?.value || 0), 0);

  const [linkModal, setLinkModal] = useState(null); // null | 'new' | link-obj
  const [lName,  setLName]  = useState('');
  const [lUrl,   setLUrl]   = useState('');
  const [lUser,  setLUser]  = useState('');
  const [lHint,  setLHint]  = useState('');

  function openLinkModal(link) {
    setLinkModal(link || 'new');
    setLName(link ? link.name     : '');
    setLUrl( link ? link.url      : '');
    setLUser(link ? link.username||'' : '');
    setLHint(link ? link.hint||''    : '');
  }
  function saveLinkModal() {
    if (!lName.trim() || !lUrl.trim()) return;
    const url = lUrl.startsWith('http') ? lUrl : 'https://' + lUrl;
    const entry = { name:lName.trim(), url, username:lUser.trim(), hint:lHint.trim() };
    if (linkModal === 'new') {
      setLinks(prev => [...prev, { id:Date.now(), ...entry }]);
    } else {
      setLinks(prev => prev.map(l => l.id===linkModal.id ? {...l,...entry} : l));
    }
    setLinkModal(null);
  }
  function deleteLink(id) { setLinks(prev => prev.filter(l=>l.id!==id)); }

  return h('div', { className:'page' },
    h('div', { className:'section-header' },
      h('h2', { className:'section-title' }, 'Financial Accounts'),
      h('p', { className:'section-sub' }, 'Tracked balances · 3, 6 & 12 month performance · click card for full history')
    ),

    h('div', { className:'acc-cards', style:{marginTop:20} },
      safeAccounts.map(a => {
        const curr  = a.entries[0]?.value || 0;
        const e3m   = entryNMonthsAgo(a.entries, 3);
        const e6m   = entryNMonthsAgo(a.entries, 6);
        const e12m  = entryNMonthsAgo(a.entries, 12);
        const p3  = e3m  && e3m.iso  !== a.entries[0]?.iso ? pctChange(curr, e3m.value)  : null;
        const p6  = e6m  && e6m.iso  !== a.entries[0]?.iso ? pctChange(curr, e6m.value)  : null;
        const p12 = e12m && e12m.iso !== a.entries[0]?.iso ? pctChange(curr, e12m.value) : null;
        const recent = a.entries.slice(0, 5);
        return h('div', { key:a.label, className:'acc-card acc-card-clickable', onClick:()=>setHistoryFor(a) },
          h('div', { className:'acc-card-name' }, a.label),
          h('div', { className:'acc-card-val' }, fmt(curr)),
          h('div', { className:'acc-card-periods' },
            p3  != null && h('span', { className:'period-badge '+(p3 >=0?'pos':'neg') }, '3m '+(p3 >=0?'+':'')+p3.toFixed(1)+'%'),
            p6  != null && h('span', { className:'period-badge '+(p6 >=0?'pos':'neg') }, '6m '+(p6 >=0?'+':'')+p6.toFixed(1)+'%'),
            p12 != null && h('span', { className:'period-badge '+(p12>=0?'pos':'neg') }, '12m '+(p12>=0?'+':'')+p12.toFixed(1)+'%'),
          ),
          h('div', { className:'acc-mini-history' },
            recent.map((e,i) => {
              const prev = recent[i+1];
              const diff = prev ? e.value - prev.value : null;
              const pos  = diff != null ? diff >= 0 : null;
              return h('div', { key:e.iso+i, className:'acc-mini-row' },
                h('span', { className:'acc-mini-date' }, e.date),
                h('span', { className:'acc-mini-val' }, fmt(e.value)),
                diff != null && h('span', { className:'acc-mini-chg '+(pos?'pos':'neg') },
                  (pos?'▲ ':'▼ ')+fmt(Math.abs(diff))),
                h('button', { className:'acc-entry-edit',
                  onClick:ev=>{ ev.stopPropagation(); setEditEntry({label:a.label,entry:e}); } }, '✎')
              );
            })
          ),
          h('div', { className:'acc-card-footer' },
            h('span', { className:'acc-view-all' }, 'View full history →'),
            h('button', { className:'acc-add-btn', onClick:e=>{ e.stopPropagation(); setAddingTo(a.label); } }, '+ Add balance')
          )
        );
      })
    ),

    h('div', { className:'acc-total-bar' },
      h('span', { className:'acc-total-label' }, 'Total Portfolio'),
      h('span', { className:'acc-total-val' }, fmt(total))
    ),

    h('div', { style:{ marginTop:24 } },
      h(PayInfoPanel, { pay, setPay })
    ),

    addingTo && h(AddEntryModal, {
      label: addingTo,
      onSave: (entry) => addEntry(addingTo, entry),
      onClose: () => setAddingTo(null)
    }),

    historyFor && h(AccountHistoryModal, {
      account: historyFor,
      onClose: () => setHistoryFor(null),
      onEditEntry: (entry) => { setHistoryFor(null); setEditEntry({label:historyFor.label,entry}); }
    }),

    editEntry && h(EditEntryModal, {
      entry: editEntry.entry,
      label: editEntry.label,
      onSave: (newEntry) => updateEntry(editEntry.label, editEntry.entry.iso, newEntry),
      onDelete: () => deleteEntry(editEntry.label, editEntry.entry.iso),
      onClose: () => setEditEntry(null)
    }),

    h('div', { style:{marginTop:24} },
      h(LinksPanel, {
        links,
        onAdd:    ()=>openLinkModal(null),
        onEdit:   (l)=>openLinkModal(l),
        onDelete: deleteLink,
      })
    ),

    linkModal && h('div', { className:'modal-overlay', onClick:()=>setLinkModal(null) },
      h('div', { className:'modal', onClick:e=>e.stopPropagation() },
        h('div', { className:'modal-title' }, linkModal==='new'?'Add Link':'Edit Link'),
        h('div', { className:'form-row' },
          h('label',{className:'form-label'},'Display name'),
          h('input',{className:'form-input',autoFocus:true,value:lName,
            onChange:e=>setLName(e.target.value)})
        ),
        h('div', { className:'form-row' },
          h('label',{className:'form-label'},'URL'),
          h('input',{className:'form-input',value:lUrl,placeholder:'https://...',
            onChange:e=>setLUrl(e.target.value)})
        ),
        h('div', { className:'form-row-2' },
          h('div',null,
            h('label',{className:'form-label'},'Username'),
            h('input',{className:'form-input',value:lUser,onChange:e=>setLUser(e.target.value)})
          ),
          h('div',null,
            h('label',{className:'form-label'},'Hint'),
            h('input',{className:'form-input',value:lHint,placeholder:'password hint…',
              onChange:e=>setLHint(e.target.value)})
          )
        ),
        h('div',{className:'modal-actions'},
          h('button',{className:'btn-cancel',onClick:()=>setLinkModal(null)},'Cancel'),
          h('button',{className:'btn-save',onClick:saveLinkModal},'Save')
        )
      )
    )
  );
}

function TrackerPage({ trackerItems, setTrackerItems }) {
  const [items,  setItems_]  = useState(trackerItems);
  const [modal,  setModal]   = useState(null); // null | 'add' | item
  // wrap setItems to also propagate up
  function setItems(v) {
    const next = typeof v === 'function' ? v(items) : v;
    setItems_(next);
    setTrackerItems(next);
  }

  function saveItem(data) {
    if (modal === 'add') {
      setItems(prev => [...prev, { ...data, id: Date.now() }]);
    } else {
      setItems(prev => prev.map(it => it.id === modal.id ? { ...it, ...data } : it));
    }
    setModal(null);
  }
  function delItem(id) { setItems(prev => prev.filter(it => it.id !== id)); }

  const sorted = [...items].sort((a,b) => {
    const da = daysBetween(a.renewal)??9999;
    const db = daysBetween(b.renewal)??9999;
    return da-db;
  });

  return h('div', { className:'page' },
    h('div', { className:'hk-toolbar' },
      h('div', { className:'section-header', style:{marginBottom:0} },
        h('h2', { className:'section-title' }, 'Renewals & Tracker'),
        h('p', { className:'section-sub' }, 'Insurance, services, and scheduled tasks')
      ),
      h('button', { className:'hk-add-btn', onClick:()=>setModal('add') }, h('span',null,'+'), 'Add Item')
    ),
    h('div', { className:'tracker-grid' },
      sorted.map(item => {
        const days=daysBetween(item.renewal), st=rnStatus(days), lbl=rnLabel(days);
        return h('div', { key:item.id,
          className:'tracker-item'+(st==='overdue'?' is-due':st==='due-soon'?' is-soon':'')
        },
          h('div', { className:'tracker-item-top' },
            h('div', null,
              h('div', { className:'tracker-item-name' }, item.name),
              item.provider && h('div', { className:'tracker-item-provider' }, item.provider)
            ),
            h('div', { style:{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:6} },
              item.cost != null && h('div', { className:'tracker-item-cost' }, fmt(item.cost)),
              h('div', { style:{display:'flex', gap:6} },
                h('button', { className:'hk-icon-btn', onClick:()=>setModal(item) }, 'Edit'),
                h('button', { className:'hk-icon-btn danger', onClick:()=>delItem(item.id) }, '×')
              )
            )
          ),
          (item.lastDone||item.renewal) && h('div', { className:'tracker-dates' },
            item.lastDone && h('div',null,
              h('div',{className:'tracker-date-lbl'},'Last done'),
              h('div',{className:'tracker-date-val'},fmtDate(item.lastDone))
            ),
            item.renewal && h('div',null,
              h('div',{className:'tracker-date-lbl'},'Due / renewal'),
              h('div',{className:'tracker-date-val'},fmtDate(item.renewal))
            )
          ),
          st && h(Badge,{status:st,label:lbl}),
          item.notes && h('div',{className:'tracker-notes'},item.notes),
          (item.linkUrl || item.username || item.pwHint) && h('div',{className:'tracker-creds'},
            item.linkUrl && h('a',{
              href: item.linkUrl.startsWith('http')?item.linkUrl:'https://'+item.linkUrl,
              target:'_blank', rel:'noopener', className:'tracker-link'
            }, item.linkName||'Open link'),
            item.username && h('span',{className:'tracker-cred-item'},
              h('span',{className:'tracker-cred-label'},'User: '),item.username),
            item.pwHint && h('span',{className:'tracker-cred-item'},
              h('span',{className:'tracker-cred-label'},'***** '),item.pwHint)
          )
        );
      })

function HomeKeepingPage({ tasks, setTasks }) {
  const [modal, setModal] = useState(null); // null | 'add' | task

  function saveTask(data) {
    if (modal === 'add') {
      setTasks(prev => [...prev, { id:Date.now(), ...data }]);
    } else {
      setTasks(prev => prev.map(t => t.id===modal.id ? { ...t, ...data } : t));
    }
    setModal(null);
  }
  function markDone(id) {
    const todayStr = TODAY.toISOString().split('T')[0];
    setTasks(prev => prev.map(t => t.id===id ? { ...t, lastDone:todayStr, nextDue:null } : t));
  }
  function del(id) { setTasks(prev => prev.filter(t=>t.id!==id)); }

  const sorted = [...tasks].sort((a,b) => {
    const order = { overdue:0, 'due-soon':1, ok:2 };
    const sa=taskStatus(a), sb=taskStatus(b);
    if (sa!==sb) return order[sa]-order[sb];
    return taskDays(a)-taskDays(b);
  });

  const overdueN = sorted.filter(t=>taskStatus(t)==='overdue').length;
  const dueSoonN = sorted.filter(t=>taskStatus(t)==='due-soon').length;
  const subtext  = [
    overdueN>0?`${overdueN} overdue`:'',
    dueSoonN>0?`${dueSoonN} due soon`:'',
  ].filter(Boolean).join(' · ') || 'All tasks up to date';

  return h('div', { className:'page' },
    h('div', { className:'hk-toolbar' },
      h('div', { className:'section-header', style:{ marginBottom:0 } },
        h('h2', { className:'section-title' }, 'Home Keeping'),
        h('p', { className:'section-sub' }, subtext)
      ),
      h('button', { className:'hk-add-btn', onClick:()=>setModal('add') },
        h('span', null, '+'), 'Add Task'
      )
    ),
    h('div', { className:'hk-tasks' },
      sorted.length===0 && h('p',{style:{color:'var(--text-dim)',padding:'16px 0'}},'No tasks yet. Add one above.'),
      sorted.map(task => {
        const st  = taskStatus(task);
        const lbl = taskLabel(task);
        const due = taskEffectiveDue(task);
        return h('div', { key:task.id, className:`hk-task ${st}` },
          h('div', { className:'hk-check', title:'Mark done today', onClick:()=>markDone(task.id) }),
          h('div', { className:'hk-task-body' },
            h('div', { className:'hk-task-name' }, task.name),
            h('div', { className:'hk-task-meta' },
              h('span',null,FREQ_LABELS[task.frequency]),
              task.lastDone && h('span',null,'Done: '+fmtDate(task.lastDone)),
              due && h('span',null,'Due: '+fmtDate(due)),
              task.nextDue && h('span',{style:{color:'var(--amber)'}},'📌 Pinned date')
            )
          ),
          h('div', { className:'hk-task-right' },
            h(Badge,{status:st,label:lbl}),
            h('button',{className:'hk-icon-btn',onClick:()=>setModal(task)},'Edit'),
            h('button',{className:'hk-icon-btn danger',onClick:()=>del(task.id)},'×')
          )
        );
      })
    ),
    modal && h(HKModal, {
      task: modal==='add' ? null : modal,
      onSave: saveTask,
      onClose: ()=>setModal(null)
    })
  );
}

function GardenPage({ plants, setPlants }) {
  const [modal, setModal] = useState(null); // null | 'add' | plant

  function savePlant(data) {
    if (modal === 'add') {
      setPlants(prev => [...prev, { ...data, id:Date.now() }]);
    } else {
      setPlants(prev => prev.map(p => p.id===modal.id ? {...p,...data} : p));
    }
    setModal(null);
  }
  function del(id)      { setPlants(prev => prev.filter(p=>p.id!==id)); }
  function skipYear(id) { setPlants(prev => prev.map(p=>p.id===id?{...p,skipYear:true}:p)); }
  function unskip(id)   { setPlants(prev => prev.map(p=>p.id===id?{...p,skipYear:false}:p)); }

  const now = new Date(); now.setHours(0,0,0,0);
  function plantDays(p) {
    if (!p.plantDate) return null;
    const d = new Date(p.plantDate); d.setHours(0,0,0,0);
    return Math.round((d - now) / 86400000);
  }
  function plantStatus(p) {
    const d = plantDays(p);
    if (d === null) return 'none';
    if (d < 0)  return 'overdue';
    if (d <= 7) return 'due-soon';
    if (d <= 30) return 'ok';
    return 'future';
  }
  function plantLabel(p) {
    const d = plantDays(p);
    if (d === null) return null;
    if (d < 0)  return `Overdue ${Math.abs(d)}d`;
    if (d === 0) return 'Plant today!';
    return `Plant in ${d}d`;
  }

  // Sort: overdue first, then due-soon, then ok, then future, then skip
  const ORDER = { overdue:0,'due-soon':1,ok:2,future:3,none:4 };
  const sorted = [...plants].sort((a,b) => {
    if (a.skipYear && !b.skipYear) return 1;
    if (!a.skipYear && b.skipYear) return -1;
    return (ORDER[plantStatus(a)]||5) - (ORDER[plantStatus(b)]||5);
  });

  return h('div', { className:'page' },
    h('div', { className:'hk-toolbar' },
      h('div', { className:'section-header', style:{marginBottom:0} },
        h('h2', { className:'section-title' }, '🌿 Garden'),
        h('p', { className:'section-sub' }, 'Plant reminders, bloom times, and seasonal tasks')
      ),
      h('button', { className:'hk-add-btn', onClick:()=>setModal('add') }, h('span',null,'+'), 'Add Plant')
    ),

    plants.length === 0 && h('div', { style:{color:'var(--text-dim)',padding:'20px 0',fontSize:14} },
      'No plants yet — add your first one above.'
    ),

    h('div', { className:'garden-grid' },
      sorted.map(p => {
        const st  = plantStatus(p);
        const lbl = plantLabel(p);
        const days= plantDays(p);
        return h('div', { key:p.id,
          className:'garden-card'+(p.skipYear?' garden-skipped':'')
            +(st==='overdue'?' garden-overdue':st==='due-soon'?' garden-soon':'')
        },
          h('div', { className:'garden-card-top' },
            h('div', null,
              h('div', { className:'garden-card-name' },
                p.skipYear && h('span',{style:{fontSize:11,color:'var(--text-dim)',marginRight:6}},'[skipped]'),
                p.name
              ),
              p.variety && h('div', { className:'garden-card-variety' }, p.variety)
            ),
            h('div', { className:'garden-card-actions' },
              h('button', { className:'hk-icon-btn', onClick:()=>setModal(p) }, 'Edit'),
              h('button', { className:'hk-icon-btn danger', onClick:()=>del(p.id) }, '×')
            )
          ),
          h('div', { className:'garden-card-meta' },
            p.plantDate && h('div', null,
              h('span', { className:'garden-meta-lbl' }, 'Plant by'),
              h('span', { className:'garden-meta-val' }, fmtDate(p.plantDate))
            ),
            p.bloom && h('div', null,
              h('span', { className:'garden-meta-lbl' }, 'Blooms'),
              h('span', { className:'garden-meta-val' }, p.bloom)
            )
          ),
          p.notes && h('div', { className:'tracker-notes' }, p.notes),
          h('div', { className:'garden-card-footer' },
            lbl && !p.skipYear && h(Badge, { status:st==='future'?'ok':st, label:lbl }),
            !p.skipYear
              ? h('button', { className:'hk-icon-btn', style:{fontSize:11},
                  onClick:()=>skipYear(p.id) }, 'Skip this year →')
              : h('button', { className:'hk-icon-btn', style:{fontSize:11},
                  onClick:()=>unskip(p.id) }, '↩ Restore')
          )
        );
      })
    ),

    modal && h(GardenModal, {
      plant:   modal === 'add' ? null : modal,
      onSave:  savePlant,
      onClose: ()=>setModal(null)
    })
  );
}

function TaxPage({ taxDates, taxDocs, setTaxDates, setTaxDocs, onSave }) {
  const [dateModal, setDateModal] = useState(null); // null|'new'|date
  const [docModal,  setDocModal]  = useState(null);

  function saveDate(data) {
    let next;
    if (dateModal === 'new') {
      next = [...taxDates, { ...data, id:Date.now() }].sort((a,b)=>a.iso.localeCompare(b.iso));
    } else {
      next = taxDates.map(d => d.id===dateModal.id ? {...d,...data} : d);
    }
    setTaxDates(next); onSave(next, taxDocs); setDateModal(null);
  }
  function delDate(id) {
    const next = taxDates.filter(d=>d.id!==id);
    setTaxDates(next); onSave(next, taxDocs);
  }
  function saveDoc(data) {
    let next;
    if (docModal === 'new') {
      next = [...taxDocs, { ...data, id:Date.now() }];
    } else {
      next = taxDocs.map(d => d.id===docModal.id ? {...d,...data} : d);
    }
    setTaxDocs(next); onSave(taxDates, next); setDocModal(null);
  }
  function delDoc(id) {
    const next = taxDocs.filter(d=>d.id!==id);
    setTaxDocs(next); onSave(taxDates, next);
  }
  function toggleDoc(id) {
    const next = taxDocs.map(d => d.id===id ? {...d,done:!d.done} : d);
    setTaxDocs(next); onSave(taxDates, next);
  }

  // Sort dates ascending, annotate with urgency
  const sorted = [...taxDates].sort((a,b)=>a.iso.localeCompare(b.iso)).map(d => {
    const days = daysBetween(d.iso);
    const past = days !== null && days < 0;
    const warn1m = days !== null && days >= 0 && days <= 30;
    const warn1w = days !== null && days >= 0 && days <= 7;
    const st = past ? 'overdue' : warn1w ? 'overdue' : warn1m ? 'due-soon' : 'ok';
    const lbl = days === null ? null : days < 0 ? `${Math.abs(days)}d ago`
      : days === 0 ? 'Today' : `In ${days}d`;
    return { ...d, days, st, lbl, past };
  });

  const upcoming = sorted.filter(d => !d.past);
  const past     = sorted.filter(d =>  d.past);

  return h('div', { className:'page' },
    // Key Dates section
    h('div', { className:'hk-toolbar' },
      h('div', { className:'section-header', style:{marginBottom:0} },
        h('h2', { className:'section-title' }, '📋 Tax'),
        h('p', { className:'section-sub' }, 'Key dates, document checklist, and financial records')
      ),
      h('button', { className:'hk-add-btn', onClick:()=>setDateModal('new') }, h('span',null,'+'), 'Add Date')
    ),

    h('div', { className:'tax-dates-grid' },
      upcoming.map(d => h('div', { key:d.id,
        className:'tax-date-card'+(d.st==='overdue'?' tax-card-urgent':d.st==='due-soon'?' tax-card-soon':'')
      },
        h('div', { className:'tax-date-top' },
          h('div', null,
            h('div', { className:'tax-date-label' }, d.label),
            d.note && h('div', { className:'tax-date-note' }, d.note)
          ),
          h('div', { className:'tax-date-actions' },
            h('button',{className:'hk-icon-btn',onClick:()=>setDateModal(d)},'Edit'),
            h('button',{className:'hk-icon-btn danger',onClick:()=>delDate(d.id)},'×')
          )
        ),
        h('div', { className:'tax-date-footer' },
          h('span', { className:'tax-date-iso' }, fmtDate(d.iso)),
          d.lbl && h(Badge, { status:d.st, label:d.lbl })
        )
      )),
      upcoming.length===0 && h('p',{style:{color:'var(--text-dim)',fontSize:13,gridColumn:'1/-1'}},'No upcoming dates')
    ),

    past.length > 0 && h('div', { style:{marginTop:20} },
      h('p', { style:{fontSize:11,textTransform:'uppercase',letterSpacing:'0.1em',color:'var(--text-dim)',marginBottom:12} }, 'Past dates'),
      h('div', { className:'tax-dates-grid' },
        past.map(d => h('div', { key:d.id, className:'tax-date-card tax-card-past' },
          h('div', { className:'tax-date-top' },
            h('div', null,
              h('div', { className:'tax-date-label' }, d.label),
              d.note && h('div', { className:'tax-date-note' }, d.note)
            ),
            h('div', { className:'tax-date-actions' },
              h('button',{className:'hk-icon-btn',onClick:()=>setDateModal(d)},'Edit'),

    dateModal && h(TaxDateModal, {

    })
  );
}

// ── WATER BILL MODAL ─────────────────────────────────────────────────────────

function WaterModal({ onClose, waterBills, setWaterBills }) {
  const [modal,   setModal]   = useState(null); // null|'new'|bill
  const [start,   setStart]   = useState('');
  const [end,     setEnd]     = useState('');
  const [charge,  setCharge]  = useState('');
  const [m3cost,  setM3cost]  = useState('');

  function openNew()  { setModal('new'); setStart(''); setEnd(''); setCharge(''); setM3cost(''); }
  function openEdit(b){ setModal(b); setStart(b.start); setEnd(b.end);
    setCharge(String(b.charge)); setM3cost(String(b.m3cost||'')); }
  function saveBill() {
    if (!start||!end||!charge) return;
    const entry = { start, end, charge:parseFloat(charge), m3cost:m3cost?parseFloat(m3cost):null };
    if (modal==='new') {
      setWaterBills(prev=>[...prev,{...entry,id:Date.now()}].sort((a,b)=>b.start.localeCompare(a.start)));
    } else {
      setWaterBills(prev=>prev.map(b=>b.id===modal.id?{...b,...entry}:b));
    }
    setModal(null);
  }
  function delBill(id) { setWaterBills(prev=>prev.filter(b=>b.id!==id)); }

  const sorted = [...waterBills].sort((a,b)=>b.start.localeCompare(a.start));

  return h('div', { className:'modal-overlay', onClick:onClose },
    h('div', { className:'modal', style:{width:600,maxHeight:'85vh',overflowY:'auto'},
      onClick:e=>e.stopPropagation() },
      h('div', { style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20} },
        h('div', { className:'modal-title', style:{marginBottom:0} }, '💧 Water Bills'),
        h('button', { className:'hk-add-btn', style:{fontSize:12,padding:'7px 14px'},
          onClick:openNew }, '+ Add Bill')
      ),

      sorted.length===0 && h('p',{style:{color:'var(--text-dim)',fontSize:13,marginBottom:16}},'No water bills recorded yet.'),

      h('div', { style:{display:'flex',flexDirection:'column',gap:10,marginBottom:modal?0:0} },
        sorted.map(b => h('div', { key:b.id, className:'water-bill-row' },
          h('div', { className:'water-bill-dates' },
            h('span',null, fmtDate(b.start) + ' → ' + fmtDate(b.end))
          ),
          h('div', { className:'water-bill-amounts' },
            h('span', { className:'water-bill-charge' }, fmt(b.charge)),
            b.m3cost && h('span', { className:'water-bill-m3' }, '£'+b.m3cost.toFixed(4)+'/m³')
          ),
          h('div', { style:{display:'flex',gap:6} },
            h('button',{className:'hk-icon-btn',onClick:()=>openEdit(b)},'Edit'),
            h('button',{className:'hk-icon-btn danger',onClick:()=>delBill(b.id)},'×')
          )
        ))
      ),

      modal && h('div', { style:{borderTop:'1px solid var(--border-soft)',paddingTop:20,marginTop:16} },
        h('p',{style:{fontSize:13,fontWeight:500,color:'var(--forest)',marginBottom:16}},
          modal==='new'?'Add Bill':'Edit Bill'),
        h('div', { className:'form-row-2' },
          h('div',null,
            h('label',{className:'form-label'},'Start date'),
            h('input',{type:'date',className:'form-input',value:start,onChange:e=>setStart(e.target.value)})
          ),
          h('div',null,
            h('label',{className:'form-label'},'End date'),
            h('input',{type:'date',className:'form-input',value:end,onChange:e=>setEnd(e.target.value)})
          )
        ),
        h('div', { className:'form-row-2' },
          h('div',null,
            h('label',{className:'form-label'},'Total charge (£)'),
            h('input',{type:'number',className:'form-input',value:charge,onChange:e=>setCharge(e.target.value)})
          ),
          h('div',null,
            h('label',{className:'form-label'},'Cost per m³ (£)'),
            h('input',{type:'number',className:'form-input',value:m3cost,
              placeholder:'optional',onChange:e=>setM3cost(e.target.value)})
          )
        ),
        h('div',{className:'modal-actions'},
          h('button',{className:'btn-cancel',onClick:()=>setModal(null)},'Cancel'),
          h('button',{className:'btn-save',onClick:saveBill},'Save Bill')
        )
      ),

      h('div',{className:'modal-actions',style:{marginTop:16}},
        h('button',{className:'btn-save',onClick:onClose},'Close')
      )
    )
  );
}

// ── SUPABASE VIA PROXY (avoids CORS) ─────────────────────────────────────────
const PROXY = '/.netlify/functions/proxy';

async function sbFetch(method, table, qs='', body=null, prefer='') {
  const url = `${PROXY}/rest/v1/${table}${qs ? '?'+qs : ''}`;
  const headers = { 'Content-Type': 'application/json' };
  if (prefer) headers['Prefer'] = prefer;
  const opts = { method, headers };
  if (body !== null) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) {
    const t = await r.text();
    throw new Error(`${method} ${table}: ${r.status} ${t}`);
  }
  const text = await r.text();
  return text ? JSON.parse(text) : [];
}

async function sbGet(table, params='') {
  return sbFetch('GET', table, params);
}
async function sbDelete(table, qs) {
  return sbFetch('DELETE', table, qs);
}
async function sbUpsert(table, rows) {
  if (!rows || (Array.isArray(rows) && rows.length===0)) return;
  const body = Array.isArray(rows) ? rows : [rows];
  return sbFetch('POST', table, '', body, 'resolution=merge-duplicates,return=minimal');
}
async function sbInsert(table, rows) {
  if (!rows || (Array.isArray(rows) && rows.length===0)) return;
  const body = Array.isArray(rows) ? rows : [rows];
  return sbFetch('POST', table, '', body, 'return=minimal');
}

// ── LOAD ALL ──────────────────────────────────────────────────────────────────
async function loadAll() {
  try {
    const [payRows, depRows, itemRows, accRows, trackerRows,
           hkRows, gardenRows, linkRows, taxDateRows, taxDocRows,
           waterRows, noteRows] = await Promise.all([
      sbGet('pay','id=eq.1'),
      sbGet('budget_deposits','id=eq.1'),
      sbGet('budget_items','order=sort_order.asc'),
      sbGet('accounts','order=label.asc,iso.desc'),
      sbGet('tracker','order=id.asc'),
      sbGet('home_keeping','order=id.asc'),
      sbGet('garden','order=id.asc'),
      sbGet('links','order=sort_order.asc'),
      sbGet('tax_dates','order=iso.asc'),
      sbGet('tax_docs','order=sort_order.asc'),
      sbGet('water_bills','order=start_date.desc'),
      sbGet('notes','id=eq.1'),
    ]);

    const p = payRows[0] || {};
    const pay = {
      salaryAnnual:    p.salary_annual    || 32019,
      incomeTaxAnnual: p.income_tax_annual|| 3696,
      niAnnual:        p.ni_annual        || 1555,
      pensionPct:      p.pension_pct      || 4.03,
    };

    const dep = depRows[0] || {};
    const deposits = { bills: dep.bills||900, joint: dep.joint||600, personal: dep.personal||500 };

    const bills    = itemRows.filter(r=>r.section==='bills')   .map(dbToItem);
    const joint    = itemRows.filter(r=>r.section==='joint')   .map(dbToItem);
    const personal = itemRows.filter(r=>r.section==='personal').map(dbToItem);

    // Group accounts by label
    const accMap = {};
    accRows.forEach(r => {
      if (!accMap[r.label]) accMap[r.label] = [];
      accMap[r.label].push({ iso:r.iso, date:fmtDate(r.iso), value:Number(r.value) });
    });
    const accountOrder = ['Barclays Savings','Monzo','OAKGLEN','Vanguard'];
    const accounts = accountOrder.map(label => ({
      label, entries: sortEntriesDesc(accMap[label]||[])
    }));

    const tracker = trackerRows.map(dbToTracker);
    const homeKeeping = hkRows.map(dbToHK);
    const garden = gardenRows.map(dbToGarden);
    const links  = linkRows.map(dbToLink);
    const taxDates = taxDateRows.map(r=>({ id:r.id, iso:r.iso, label:r.label, note:r.note||'' }));
    const taxDocs  = taxDocRows.map(r=>({ id:r.id, label:r.label, detail:r.detail||'', done:!!r.done }));
    const water = waterRows.map(r=>({ id:r.id, start:r.start_date, end:r.end_date,
      charge:Number(r.charge), m3cost:r.m3_cost?Number(r.m3_cost):null }));
    const note = noteRows[0]?.content || '';

    return { ok:true, pay, deposits, bills, joint, personal,
      accounts, tracker, homeKeeping, garden, links,
      tax:{dates:taxDates,docs:taxDocs}, water, note };
  } catch(e) {
    console.error('Load failed:', e);
    return null;
  }
}

// ── DB MAPPERS ─────────────────────────────────────────────────────────────────
function dbToItem(r) {
  return { id:r.id, name:r.name, amount:Number(r.amount), isPot:!!r.is_pot,
    rawAmount:r.raw_amount?Number(r.raw_amount):null,
    freqNum:r.freq_num||1, freqUnit:r.freq_unit||'months' };
}
function dbToTracker(r) {
  return { id:r.id, name:r.name, provider:r.provider||'',
    cost:r.cost!=null?Number(r.cost):null,
    lastDone:r.last_done||null, renewal:r.renewal||null, notes:r.notes||'',
    schedNum:r.sched_num||1, schedUnit:r.sched_unit||'months',
    linkName:r.link_name||'', linkUrl:r.link_url||'',
    username:r.username||'', pwHint:r.pw_hint||'' };
}
function dbToHK(r) {
  return { id:r.id, name:r.name, frequency:r.frequency,
    lastDone:r.last_done||null, nextDue:r.next_due||null };
}
function dbToGarden(r) {
  return { id:r.id, name:r.name, variety:r.variety||'',
    plantDate:r.plant_date||null, bloom:r.bloom||'',
    notes:r.notes||'', skipYear:!!r.skip_year };
}
function dbToLink(r) {
  return { id:r.id, name:r.name, url:r.url,
    username:r.username||'', hint:r.hint||'' };
}

// ── SAVE SECTION ───────────────────────────────────────────────────────────────
async function saveSection(section, data) {
  try {
    if (section === 'pay') {
      await sbUpsert('pay', [{
        id:1,
        salary_annual:    data.salaryAnnual,
        income_tax_annual:data.incomeTaxAnnual,
        ni_annual:        data.niAnnual,
        pension_pct:      data.pensionPct,
      }]);
    }
    else if (section === 'budget') {
      await sbUpsert('budget_deposits', [{ id:1,
        bills:data.deposits.bills, joint:data.deposits.joint, personal:data.deposits.personal }]);
      // Replace all items: delete then insert
      await sbDelete('budget_items', 'id=gte.0');
      const allItems = [
        ...data.bills.map((r,i)=>itemToDb(r,'bills',i)),
        ...data.joint.map((r,i)=>itemToDb(r,'joint',i)),
        ...data.personal.map((r,i)=>itemToDb(r,'personal',i)),
      ];
      if (allItems.length) await sbInsert('budget_items', allItems);
    }
    else if (section === 'accounts') {
      // Delete all then reinsert
      await sbDelete('accounts', 'id=gte.0');
      const rows = [];
      data.forEach(acc => acc.entries.forEach(e => rows.push({
        label:acc.label, iso:e.iso, display_date:fmtDate(e.iso), value:e.value
      })));
      if (rows.length) await sbInsert('accounts', rows);
    }
    else if (section === 'tracker') {
      await sbDelete('tracker', 'id=gte.0');
      if (data.length) await sbInsert('tracker', data.map(trackerToDb));
    }
    else if (section === 'homeKeeping') {
      await sbDelete('home_keeping', 'id=gte.0');
      if (data.length) await sbInsert('home_keeping', data.map(hkToDb));
    }
    else if (section === 'garden') {
      await sbDelete('garden', 'id=gte.0');
      if (data.length) await sbInsert('garden', data.map(gardenToDb));
    }
    else if (section === 'links') {
      await sbDelete('links', 'id=gte.0');
      if (data.length) await sbInsert('links', data.map((l,i)=>({
        id:l.id, name:l.name, url:l.url, username:l.username||'', hint:l.hint||'', sort_order:i
      })));
    }
    else if (section === 'tax') {
      await sbDelete('tax_dates', 'id=gte.0');
      await sbDelete('tax_docs', 'id=gte.0');
      if (data.dates.length) await sbInsert('tax_dates', data.dates.map(d=>({
        id:d.id, iso:d.iso, label:d.label, note:d.note||''
      })));
      if (data.docs.length) await sbInsert('tax_docs', data.docs.map((d,i)=>({
        id:d.id, label:d.label, detail:d.detail||'', done:!!d.done, sort_order:i
      })));
    }
    else if (section === 'water') {
      await sbDelete('water_bills', 'id=gte.0');
      if (data.length) await sbInsert('water_bills', data.map(b=>({
        id:b.id, start_date:b.start, end_date:b.end, charge:b.charge,
        m3_cost:b.m3cost!=null?b.m3cost:null
      })));
    }
    else if (section === 'note') {
      await sbUpsert('notes', [{ id:1, content:String(data) }]);
    }
  } catch(e) { console.error('Save error:', section, e); }
}

// ── DB WRITE MAPPERS ──────────────────────────────────────────────────────────
function itemToDb(r, section, i) {
  return { id:r.id, section, name:r.name, amount:r.amount, is_pot:!!r.isPot,
    raw_amount:r.rawAmount||null, freq_num:r.freqNum||1, freq_unit:r.freqUnit||'months', sort_order:i };
}
function trackerToDb(r) {
  return { id:r.id, name:r.name, provider:r.provider||'',
    cost:r.cost!=null?r.cost:null, last_done:r.lastDone||null, renewal:r.renewal||null,
    notes:r.notes||'', sched_num:r.schedNum||1, sched_unit:r.schedUnit||'months',
    link_name:r.linkName||'', link_url:r.linkUrl||'',
    username:r.username||'', pw_hint:r.pwHint||'' };
}
function hkToDb(r) {
  return { id:r.id, name:r.name, frequency:r.frequency,
    last_done:r.lastDone||null, next_due:r.nextDue||null };
}
function gardenToDb(r) {
  return { id:r.id, name:r.name, variety:r.variety||'',
    plant_date:r.plantDate||null, bloom:r.bloom||'',
    notes:r.notes||'', skip_year:!!r.skipYear };
}

// ── SAVE INDICATOR ────────────────────────────────────────────────────────────
function SaveBar({ status }) {
  // status: 'idle' | 'saving' | 'saved' | 'error'
  if (status === 'idle') return null;
  const msg   = status === 'saving' ? 'Saving…' : status === 'saved' ? '✓ Saved' : '⚠ Save failed';
  const color = status === 'error'  ? 'var(--red)' : status === 'saved' ? 'var(--green-ok)' : 'var(--text-dim)';
  return h('div', { style:{
    position:'fixed', bottom:20, right:24, zIndex:300,
    background:'var(--surface)', border:'1px solid var(--border-soft)',
    borderRadius:8, padding:'8px 18px', fontSize:13,
    color, boxShadow:'0 4px 16px rgba(0,0,0,0.08)',
    transition:'opacity 0.3s',
  }}, msg);
}

// ── APP ───────────────────────────────────────────────────────────────────────

function App() {
  const [tab,      setTab]      = useState('Home');
  const [loading,  setLoading]  = useState(true);
  const [saveStatus, setSave]   = useState('idle');

  const [hkTasks,  setHkTasks]  = useState(DEFAULT_HK);
  const [note,     setNote]     = useState('');
  const [deposits, setDeposits] = useState({ bills:INIT_BILLS_DEPOSIT, joint:INIT_JOINT_DEPOSIT, personal:INIT_PERSONAL_BUDGET });
  const [bills,    setBills]    = useState(INIT_BILLS);
  const [joint,    setJoint]    = useState(INIT_JOINT);
  const [personal, setPersonal] = useState(INIT_PERSONAL);
  const [pay,      setPay]      = useState(INIT_PAY);
  const [accounts, setAccounts] = useState(INIT_ACCOUNTS);
  const [tracker,  setTracker]  = useState(TRACKER_ITEMS.map((t,i)=>({...t,id:i+1})));
  const [gardenPlants, setGardenPlants] = useState([]);
  const [links,        setLinks]        = useState(INIT_LINKS);
  const [taxDates,     setTaxDates]     = useState(INIT_TAX_DATES);
  const [taxDocs,      setTaxDocs]      = useState(INIT_TAX_DOCS);
  const [waterBills,   setWaterBills]   = useState([]);

  // ── Load on mount ─────────────────────────────────────────────────
  useEffect(() => {
    loadAll().then(d => {
      if (!d) { setLoading(false); return; }
      if (d.pay)         setPay(d.pay);
      if (d.deposits)    setDeposits(d.deposits);
      if (d.bills    && d.bills.length)    setBills(d.bills);
      if (d.joint    && d.joint.length)    setJoint(d.joint);
      if (d.personal && d.personal.length) setPersonal(d.personal);
      if (d.tracker  && d.tracker.length)  {
        // Clean up any badly-formatted dates from sheet
        const cleaned = d.tracker.map(t => ({
          ...t,
          lastDone: cleanDate(t.lastDone),
          renewal:  cleanDate(t.renewal),
        }));
        setTracker(cleaned);
      }
      if (d.homeKeeping && d.homeKeeping.length) setHkTasks(d.homeKeeping);
      if (d.garden && d.garden.length) setGardenPlants(d.garden);
      if (d.links  && d.links.length)  setLinks(d.links);
      if (d.tax) {
        if (d.tax.dates && d.tax.dates.length) setTaxDates(d.tax.dates);
        if (d.tax.docs  && d.tax.docs.length)  setTaxDocs(d.tax.docs);
      }
      if (d.water && d.water.length) setWaterBills(d.water);
      if (d.note !== undefined) setNote(d.note);

      // Accounts — Supabase returns clean ISO dates, just sort
      if (d.accounts && d.accounts.some(a => a.entries.length > 0)) {
        setAccounts(d.accounts);
      } else {
        // First run — seed from hardcoded history
        setAccounts(INIT_ACCOUNTS);
        saveSection('accounts', INIT_ACCOUNTS);
      }

      setLoading(false);
    });
  }, []);

  // ── Save helper with indicator ────────────────────────────────────
  async function save(section, data) {
    setSave('saving');
    await saveSection(section, data);
    setSave('saved');
    setTimeout(() => setSave('idle'), 2500);
  }

  // ── Wrapped setters that auto-save ───────────────────────────────
  function setAndSavePay(v)          { setPay(v);          save('pay', v); }
  function setAndSaveGarden(v)       { setGardenPlants(v); save('garden', typeof v==='function'?v(gardenPlants):v); }
  function setAndSaveTax(dates, docs) {
    setTaxDates(dates); setTaxDocs(docs);
    save('tax', { dates, docs });
  }
  function setAndSaveWater(v)       { setWaterBills(v);   save('water', typeof v==='function'?v(waterBills):v); }
  function setAndSaveNote(v)      { setNote(v);      save('note', v); }
  function setAndSaveLinks(v)     { setLinks(v);     save('links', typeof v==='function'?v(links):v); }
  function setAndSaveHK(v)       { setHkTasks(v);  save('homeKeeping', typeof v === 'function' ? v(hkTasks) : v); }
  function setAndSaveTracker(v)  { setTracker(v);  save('tracker', typeof v === 'function' ? v(tracker) : v); }
  function setAndSaveAccounts(v) { setAccounts(v); save('accounts', typeof v === 'function' ? v(accounts) : v); }

  // Budget needs all pieces saved together
  function saveBudget({ dep, b, j, p }) {
    const nd = dep || deposits, nb = b || bills, nj = j || joint, np = p || personal;
    save('budget', { deposits: nd, bills: nb, joint: nj, personal: np });
  }

  function wrapDeposits(updater) {
    const next = typeof updater === 'function' ? updater(deposits) : updater;
    setDeposits(next);
    saveBudget({ dep: next });
  }
  function wrapBills(updater) {
    const next = typeof updater === 'function' ? updater(bills) : updater;
    setBills(next);
    saveBudget({ b: next });
  }
  function wrapJoint(updater) {
    const next = typeof updater === 'function' ? updater(joint) : updater;
    setJoint(next);
    saveBudget({ j: next });
  }
  function wrapPersonal(updater) {
    const next = typeof updater === 'function' ? updater(personal) : updater;
    setPersonal(next);
    saveBudget({ p: next });
  }

  if (loading) return h('div', { style:{
    display:'flex', alignItems:'center', justifyContent:'center',
    height:'100vh', flexDirection:'column', gap:16,
    fontFamily:'Jost,sans-serif', color:'var(--text-dim)',
  }},
    h('div', { style:{fontSize:24, color:'var(--forest)', fontFamily:'Cormorant Garamond,serif'} }, 'W&R'),
    h('div', { style:{fontSize:13, letterSpacing:'0.1em'} }, 'Loading your data…')
  );

  return h('div', null,
    h(Nav, { tab, setTab }),
    h(SaveBar, { status: saveStatus }),
    tab==='Home'         && h(HomePage,        { hkTasks, note, setNote:setAndSaveNote, gardenPlants }),
    tab==='Budget'       && h(BudgetPage,      { deposits, setDeposits:wrapDeposits, bills, setBills:wrapBills, joint, setJoint:wrapJoint, personal, setPersonal:wrapPersonal, pay, waterBills, setWaterBills:setAndSaveWater }),
    tab==='Accounts'     && h(AccountsPage,    { pay, setPay:setAndSavePay, accounts, setAccounts:setAndSaveAccounts, links, setLinks:setAndSaveLinks }),
    tab==='Tracker'      && h(TrackerPage,     { trackerItems:tracker, setTrackerItems:setAndSaveTracker }),
    tab==='Home Keeping' && h(HomeKeepingPage, { tasks:hkTasks, setTasks:setAndSaveHK }),
    tab==='Garden'       && h(GardenPage,      { plants:gardenPlants, setPlants:setAndSaveGarden }),
    tab==='Tax'          && h(TaxPage,         { taxDates, taxDocs, setTaxDates, setTaxDocs, onSave:setAndSaveTax })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
